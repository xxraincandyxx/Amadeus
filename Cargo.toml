[package]
name = "claude-agent"
version = "0.1.0"
edition = "2021"

[dependencies]
tokio = { version = "1.39", features = ["full"] }
reqwest = { version = "0.12", features = ["json", "stream"] }
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
dotenvy = "0.15"
anyhow = "1.0"
thiserror = "1.0"
colored = "2.1"
crossterm = { version = "0.27", features = ["event-stream"] }
futures = "0.3"

[dev-dependencies]
mockito = "1.4"
wiremock = "0.6"
tokio-test = "0.4"
